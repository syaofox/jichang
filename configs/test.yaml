- name: 🇭🇰 香港x
  type: select
  proxies: []
  filter: (?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|美)).)*$
- name: 🇹🇼 台湾
  type: select
  proxies: []
  filter: (?=.*(台|TW|(?i)Taiwan))^((?!(港|日|韩|新|美)).)*$
- name: 🇰🇷 韩国
  type: select
  proxies: []
  filter: (?=.*(韩|KR|(?i)Korea))^((?!(港|台|日|新|美)).)*$
- name: 🇯🇵 日本
  type: select
  proxies: []
  filter: (?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$
- name: 🇸🇬 坡县
  type: select
  proxies: []
  filter: (?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|美|港)).)*$
- name: 🇺🇲 美国
  type: select
  proxies: []
  filter: (?=.*(美|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$
- name: 其他
  type: select
  proxies: []
  filter: ^((?!(港|HK|Hong|日|JP|Japan|新|SG|Singapore|美|US|States|America|台|TW|Taiwan|韩|KR|Korea)).)*$
- name: 全部
  type: select
  proxies: []
- name: 自动选择
  type: url-test
  filter: ^((?!(直连)).)*$
  tolerance: 20
  interval: 300
