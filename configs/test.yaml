mixed-port: 7890
allow-lan: true
bind-address: '*'
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true
proxies:
- name: 直连
  type: direct
proxy-providers:
  ykkk:
    url: 订阅地址1
    type: http
    interval: 864000
    proxy: 直连
  ssrdog:
    url: 订阅地址2
    type: http
    interval: 8640000
    proxy: 直连
dns:
  enable: true
  cache_algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect_rules: true
  enhanced_mode: fake-ip
  fake_ip_range: 28.0.0.1/8
  fake_ip_filter_mode: blacklist
  default_nameserver:
  - https://223.5.5.5/dns-query
  proxy_server_nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  direct_nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  nameserver:
  - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
  fake_ip_filter: []
tun:
  enable: true
  stack: mixed
  dns-hijack:
  - any:53
  - tcp://any:53
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  skip_domain: []
