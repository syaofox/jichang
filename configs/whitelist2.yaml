# 机场订阅
proxy-providers:
  ssrdog:
    url: "xxx" # 替换为你的机场订阅链接
    type: http
    interval: 864000
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT

# 全局配置 
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile: {store-selected: true, store-fake-ip: true}

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    TLS: {ports: [443, 8443]}
  skip-domain: ["Mijia Cloud", "+.push.apple.com"]

# 入站
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  default-nameserver: [https://223.5.5.5/dns-query]
  proxy-server-nameserver: [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
  direct-nameserver: [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
  nameserver: ["https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24"]
  fake-ip-filter: ["rule-set:fakeipfilter_domain"]

proxy-groups:
  - {name: 自动选择, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "^((?!(DIRECT|GB|Traffic|Expire)).)*$"}
  - {name: 默认代理, type: select, include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: 国内补充, type: select, include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: 漫画柜, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: javdb, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: 禁漫天堂, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: dmm, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: pikpak, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: opencode, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: YouTube, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: Google, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: AI, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: GitHub, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: OneDrive, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: Microsoft, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: TikTok, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: Telegram, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: NETFLIX, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}
  - {name: PayPal, type: select, proxies: [默认代理], include-all: true, filter: "^((?!(GB|Traffic|Expire)).)*$"}

# 规则匹配
rules:
  # 拦截 UDP 443 (QUIC)
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  
  - RULE-SET,youtubeapp,YouTube
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,private_domain,DIRECT
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT
  - RULE-SET,domestic,DIRECT           
  
  - RULE-SET,proxylite,默认代理
  - RULE-SET,ai,AI
  - RULE-SET,github_domain,GitHub
  - RULE-SET,youtube_domain,YouTube
  - RULE-SET,google_domain,Google
  - RULE-SET,onedrive_domain,OneDrive
  - RULE-SET,microsoft_domain,Microsoft
  - RULE-SET,apple_domain,DIRECT
  - RULE-SET,tiktok_domain,TikTok
  - RULE-SET,telegram_domain,Telegram
  - RULE-SET,netflix_domain,NETFLIX
  - RULE-SET,paypal_domain,PayPal
  - RULE-SET,manhuagui,漫画柜
  - RULE-SET,x18comic,禁漫天堂
  - RULE-SET,dmm,dmm
  - RULE-SET,javdb,javdb
  - RULE-SET,pikpak,pikpak
  - RULE-SET,opencode,opencode
  
  - RULE-SET,apple_ip,DIRECT
  - RULE-SET,google_ip,Google
  - RULE-SET,netflix_ip,NETFLIX
  - RULE-SET,telegram_ip,Telegram
   
   # 地理位置规则，放在最后以覆盖前面的规则，确保国内流量走直连
  - GEOSITE,geolocation-cn,DIRECT
  # 最终兜底
  - MATCH,默认代理

# 规则集定义 
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}

