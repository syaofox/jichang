# 1. 代理集合配置
proxy-providers:
  ssrdog:
    url: "你的订阅链接" # 请在此处填入链接
    type: http
    interval: 86400
    health-check: {enable: true, url: "https://www.gstatic.com/generate_204", interval: 300}
    override:
      additional-prefix: "[ssrdog]"
      client-fingerprint: chrome 

proxies: 
  - name: "直连"
    type: direct
    udp: true

mixed-port: 7890
ipv6: false
allow-lan: true
unified-delay: false
tcp-concurrent: true
external-controller: 0.0.0.0:9090
external-ui: ui
external-ui-url: "https://gh-proxy.org/https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

geodata-mode: true
geox-url:
  geoip: "https://gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: "https://gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

find-process-mode: strict


profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "rule-set:fakeipfilter_domain"

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "*"
    - "+.lan"
    - "+.local"
    - "+.market.xiaomi.com"
    - "+.miui.com"
    - "+.xiaomi.com"
    - "rule-set:fakeipfilter_domain" # 保持你引用的远程 filter

  # 1. 基础解析器：仅用于解析 DoH 域名和拨号，必须是纯 IP
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
    - 8.8.8.8

  # 2. 代理服务器解析器：专门解析你的机场/订阅服务器域名
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  # 3. 默认解析器：并行请求，谁快用谁
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  # 4. 关键：分流策略 (Nameserver Policy)
  # 优先级最高，根据域名类型指定解析服务器
  nameserver-policy:
    # 国内域名：走国内加密 DNS，确保 CDN 调度最快
    "geosite:cn": [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
    
    # 国外域名：走海外加密 DNS，彻底解决污染，并利用 Fake-IP 秒开
    "geosite:geolocation-!cn": [https://dns.cloudflare.com/dns-query, https://dns.google/dns-query]
    
    # 针对特定的 Apple 或 Telegram 域名（可选，提升稳定性）
    "geosite:apple": [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
    "geosite:telegram": [https://dns.cloudflare.com/dns-query, https://dns.google/dns-query]


proxy-groups:
