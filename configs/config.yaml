# url 里填写自己的订阅,名称不能重复
proxy-providers:
  ssrdog_local:
    url: "http://10.10.10.6:9000/download/ssrdog"
    type: http
    interval: 86400
    health-check: {enable: true, url: "https://www.gstatic.com/generate_204", interval: 300}
    override:
      additional-prefix: "[ssrdog_local]"  

proxies: 
  - name: "直连"
    type: direct
    udp: true

mixed-port: 7890
ipv6: false
allow-lan: true
unified-delay: false
tcp-concurrent: true
external-controller: 0.0.0.0:9090
external-ui: ui             
external-ui-name: metacubexd 
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

geodata-mode: true
geox-url:
  geoip: "https://gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: "https://gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

find-process-mode: strict

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "rule-set:fakeipfilter_domain"
  skip-src-address:
    - 169.254.169.254/32 
    
tun:
  enable: true
  stack: gvisor
  device: mihomo0
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "169.254.169.254" 
    - "+.market.xiaomi.com"
    - "+.miui.com"
    - "+.xiaomi.com"
    - "rule-set:fakeipfilter_domain"
    - "connectivity-check.gstatic.com"
    - "msftconnecttest.com"
    - "msftncsi.com"

  # 1. 基础解析器：必须是纯 IP
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 2. 代理服务器解析器：专门用于解析机场节点的域名（改用高可用国内 DOH，绝不走代理）
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 3. 默认解析器：主要处理未被 policy 命中的域名，全部用国内无污染/大厂IP，防止死锁
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    # - https://dns.alidns.com/dns-query

  # 4. 兜底解析器：当 nameserver 解析出的 IP 为国外时触发
  fallback:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
  
  # 5. 兜底过滤
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

  # 6. 分流策略
  nameserver-policy:
    "geosite:cn": [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
    # 将下面这些国外的 DOH 纯域名，改为带有纯 IP 的 DOH，防止极端的首次解析延迟
    "geosite:geolocation-!cn": [https://1.1.1.1/dns-query, https://8.8.8.8/dns-query]
    "geosite:apple": [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
    "geosite:microsoft": [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
    "geosite:telegram": [https://1.1.1.1/dns-query, https://8.8.8.8/dns-query]

# 定义正则模板
.filter_template: &filter_rule "^((?!(GB|Traffic|Expire|直连|DIRECT)).)*$"

proxy-groups:
  # 【重要修改】默认代理移除了“直连”，如果机场挂了它会报错拒绝，而不是盲目走直连导致超时卡死
  - {name: 默认代理, type: select, include-all: true, filter: *filter_rule}
  - {name: 国内直连, type: select, proxies: [直连, 默认代理]}
  
  # 业务分组
  - {name: 漫画柜, type: select, proxies: [默认代理, 直连], include-all: true, filter: *filter_rule}
  - {name: JavDB, type: select, proxies: [默认代理, 直连], include-all: true, filter: *filter_rule}
  - {name: 禁漫天堂, type: select, proxies: [默认代理, 直连], include-all: true, filter: *filter_rule}
  - {name: DMM, type: select, proxies: [默认代理, 直连], include-all: true, filter: *filter_rule}
  - {name: PickPak, type: select, proxies: [默认代理, 直连], include-all: true, filter: *filter_rule}
  - {name: OpenCode, type: select, proxies: [默认代理, 直连], include-all: true, filter: *filter_rule}
  - {name: YouTube, type: select, proxies: [默认代理, 直连], include-all: true, filter: *filter_rule}
  - {name: Google, type: select, proxies: [默认代理, 直连], include-all: true, filter: *filter_rule}
  - {name: AI, type: select, proxies: [默认代理, 直连], include-all: true, filter: *filter_rule}
  - {name: GitHub, type: select, proxies: [默认代理, 直连], include-all: true, filter: *filter_rule}
  
  - {name: OneDrive, type: select, proxies: [直连, 默认代理], include-all: true, filter: *filter_rule}
  - {name: Microsoft, type: select, proxies: [直连, 默认代理], include-all: true, filter: *filter_rule}
  - {name: Apple, type: select, proxies: [直连, 默认代理], include-all: true, filter: *filter_rule}
  
  - {name: TikTok, type: select, proxies: [默认代理, 直连], include-all: true, filter: *filter_rule}
  - {name: Telegram, type: select, proxies: [默认代理, 直连], include-all: true, filter: *filter_rule}
  - {name: NETFLIX, type: select, proxies: [默认代理, 直连], include-all: true, filter: *filter_rule}
  - {name: PayPal, type: select, proxies: [默认代理, 直连], include-all: true, filter: *filter_rule}

rules:
  # 拦截普通流量的 UDP 443 (QUIC)
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  - AND,((NETWORK,UDP),(DST-PORT,123)),国内直连
  - IP-CIDR,169.254.169.254/32,REJECT,no-resolve
  - GEOSITE,private,国内直连
  - GEOIP,private,国内直连,no-resolve
  
  # 针对具体域名的分流
  - RULE-SET,youtubeapp,YouTube
  - RULE-SET,manhuagui,漫画柜
  - RULE-SET,x18comic,禁漫天堂
  - RULE-SET,dmm,DMM
  - RULE-SET,javdb,JavDB
  - RULE-SET,pikpak,PickPak
  - RULE-SET,opencode,OpenCode
  - RULE-SET,proxylite,默认代理
  - RULE-SET,domestic,国内直连   
  
  - GEOSITE,category-ai-!cn,AI 
  - GEOSITE,youtube,YouTube
  - GEOSITE,google,Google
  - GEOSITE,github,GitHub
  - GEOSITE,netflix,NETFLIX
  - GEOSITE,telegram,Telegram
  - GEOSITE,tiktok,TikTok
  - GEOSITE,microsoft,Microsoft
  - GEOSITE,apple,Apple
  - GEOSITE,paypal,PayPal         

  - GEOSITE,cn,国内直连                  
  - GEOIP,cn,国内直连,no-resolve         
  - MATCH,默认代理

rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}

rule-providers: 
  proxylite: { <<: *class, url: "https://raw.githubusercontent.com/syaofox/jichang/main/rule-providers/proxy.list"}
  domestic: { <<: *class, url: "https://raw.githubusercontent.com/syaofox/jichang/main/rule-providers/domestic.list"}
  manhuagui: { <<: *class, url: "https://raw.githubusercontent.com/syaofox/jichang/main/rule-providers/manhuagui.list"}
  x18comic: { <<: *class, url: "https://raw.githubusercontent.com/syaofox/jichang/main/rule-providers/18comic.list"}
  dmm: { <<: *class, url: "https://raw.githubusercontent.com/syaofox/jichang/main/rule-providers/dmm.list"}
  javdb: { <<: *class, url: "https://raw.githubusercontent.com/syaofox/jichang/main/rule-providers/javdb.list"}
  pikpak: { <<: *class, url: "https://raw.githubusercontent.com/syaofox/jichang/main/rule-providers/pikpak.list"}
  opencode: { <<: *class, url: "https://raw.githubusercontent.com/syaofox/jichang/main/rule-providers/opencode.list"}
  youtubeapp: { <<: *class, url: "https://raw.githubusercontent.com/syaofox/jichang/main/rule-providers/youtubeapp.list"}
