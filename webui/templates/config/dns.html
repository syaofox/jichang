{% extends "base.html" %}

{% block title %}DNS 设置 - Clash Config Manager{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex items-center gap-4">
        <a href="/config" class="text-gray-500 hover:text-gray-700">← 配置管理</a>
        <h1 class="text-2xl font-bold">DNS 设置</h1>
    </div>

    <form hx-post="/api/config/dns" hx-swap="none" class="bg-white rounded-lg shadow p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium mb-2">监听地址</label>
                <input type="text" name="dns.listen" value="{{ config.dns.listen }}"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">增强模式</label>
                <select name="dns.enhanced_mode" 
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="fake-ip" {% if config.dns.enhanced_mode == 'fake-ip' %}selected{% endif %}>Fake-IP</option>
                    <option value="redir-host" {% if config.dns.enhanced_mode == 'redir-host' %}selected{% endif %}>Redir-Host</option>
                </select>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">Fake-IP 范围</label>
            <input type="text" name="dns.fake_ip_range" value="{{ config.dns.fake_ip_range }}"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono">
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">Nameserver</label>
            <textarea name="dns.nameserver" rows="4"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono text-sm">{{ '\n'.join(config.dns.nameserver) }}</textarea>
            <p class="text-xs text-gray-500 mt-1">每行一个服务器地址</p>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">Direct Nameserver</label>
            <textarea name="dns.direct_nameserver" rows="3"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono text-sm">{{ '\n'.join(config.dns.direct_nameserver) }}</textarea>
            <p class="text-xs text-gray-500 mt-1">直连使用的 DNS 服务器</p>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">Proxy Server Nameserver</label>
            <textarea name="dns.proxy_server_nameserver" rows="2"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono text-sm">{{ '\n'.join(config.dns.proxy_server_nameserver) }}</textarea>
            <p class="text-xs text-gray-500 mt-1">代理模式下使用的 DNS 服务器</p>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">Fake-IP Filter</label>
            <textarea name="dns.fake_ip_filter" rows="4"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono text-sm">{{ '\n'.join(config.dns.fake_ip_filter) }}</textarea>
            <p class="text-xs text-gray-500 mt-1">不进行 Fake-IP 过滤的域名</p>
        </div>

        <div class="flex flex-wrap gap-6">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="dns.enable" value="true" {% if config.dns.enable %}checked{% endif %}
                    class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                <span class="text-sm font-medium">启用 DNS</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="dns.ipv6" value="true" {% if config.dns.ipv6 %}checked{% endif %}
                    class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                <span class="text-sm font-medium">启用 IPv6</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="dns.respect_rules" value="true" {% if config.dns.respect_rules %}checked{% endif %}
                    class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                <span class="text-sm font-medium">遵守规则</span>
            </label>
        </div>

        <div class="flex justify-end">
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                保存配置
            </button>
        </div>
    </form>
</div>
{% endblock %}
