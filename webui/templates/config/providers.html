{% extends "base.html" %}

{% block title %}订阅源 - Clash Config Manager{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex items-center gap-4">
        <a href="/config" class="text-gray-500 hover:text-gray-700">← 配置管理</a>
        <h1 class="text-2xl font-bold">订阅源</h1>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="providers-grid">
        {% for name, provider in config.proxy_providers.items() %}
        <div class="provider-card bg-white rounded-lg shadow p-6">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-lg font-medium">{{ name }}</h3>
                <span class="text-xs px-2 py-1 rounded bg-gray-100">{{ provider.type }}</span>
            </div>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">订阅地址</label>
                    <input type="text" value="{{ provider.url }}" placeholder="https://..."
                        class="w-full px-3 py-2 border rounded-lg text-sm font-mono">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">更新间隔</label>
                        <input type="text" value="{{ provider.interval }}秒" 
                            class="w-full px-3 py-2 border rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">健康检查代理</label>
                        <select class="w-full px-3 py-2 border rounded-lg text-sm">
                            <option selected>{{ provider.proxy }}</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    {% if not config.proxy_providers %}
    <div class="bg-white rounded-lg shadow p-6 text-center text-gray-500">
        暂无订阅源配置
    </div>
    {% endif %}
</div>
{% endblock %}
