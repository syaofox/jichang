{% extends "base.html" %}

{% block title %}嗅探设置 - Clash Config Manager{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex items-center gap-4">
        <a href="/config" class="text-gray-500 hover:text-gray-700">← 配置管理</a>
        <h1 class="text-2xl font-bold">嗅探设置</h1>
    </div>

    {% if config.sniffer %}
    <form class="bg-white rounded-lg shadow p-6 space-y-6">
        <div class="flex items-center gap-4">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="enable" value="true" {% if config.sniffer.enable %}checked{% endif %}
                    class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                <span class="font-medium">启用嗅探</span>
            </label>
        </div>

        <div>
            <h3 class="font-medium mb-3">HTTP 嗅探</h3>
            <div class="p-4 bg-gray-50 rounded-lg space-y-3">
                <label class="flex items-center gap-2">
                    <input type="checkbox" checked disabled class="w-4 h-4">
                    <span class="text-sm">启用 HTTP 嗅探</span>
                </label>
                <div>
                    <label class="block text-sm text-gray-600 mb-2">端口</label>
                    <input type="text" value="{{ config.sniffer.sniff.HTTP.ports|join(', ') if config.sniffer.sniff.HTTP else '80, 8080-8880' }}"
                        class="w-full px-3 py-2 border rounded-lg font-mono text-sm">
                </div>
            </div>
        </div>

        <div>
            <h3 class="font-medium mb-3">TLS 嗅探</h3>
            <div class="p-4 bg-gray-50 rounded-lg space-y-3">
                <label class="flex items-center gap-2">
                    <input type="checkbox" checked disabled class="w-4 h-4">
                    <span class="text-sm">启用 TLS 嗅探</span>
                </label>
                <div>
                    <label class="block text-sm text-gray-600 mb-2">端口</label>
                    <input type="text" value="{{ config.sniffer.sniff.TLS.ports|join(', ') if config.sniffer.sniff.TLS else '443, 8443' }}"
                        class="w-full px-3 py-2 border rounded-lg font-mono text-sm">
                </div>
            </div>
        </div>

        <div>
            <h3 class="font-medium mb-3">跳过域名</h3>
            <div class="space-y-2">
                {% for domain in config.sniffer.skip_domain %}
                <div class="flex items-center gap-2">
                    <code class="flex-1 font-mono text-sm bg-gray-100 px-2 py-1 rounded">{{ domain }}</code>
                    <button type="button" class="text-red-500 hover:text-red-700">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                {% endfor %}
            </div>
        </div>
    </form>
    {% else %}
    <div class="bg-white rounded-lg shadow p-6 text-center text-gray-500">
        暂未配置嗅探
    </div>
    {% endif %}
</div>
{% endblock %}
