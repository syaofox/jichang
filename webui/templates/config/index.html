{% extends "base.html" %}

{% block title %}配置管理 - Clash Config Manager{% endblock %}

{% block content %}
<div class="space-y-6">
    <h1 class="text-2xl font-bold">配置管理</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <a href="/config/dns" class="bg-white rounded-lg shadow p-6 hover:shadow-lg transition-shadow">
            <div class="flex items-center gap-4">
                <div class="text-4xl">🌐</div>
                <div>
                    <h2 class="text-lg font-medium">DNS 设置</h2>
                    <p class="text-sm text-gray-500">Nameserver / Fake-IP / 过滤器</p>
                </div>
            </div>
        </a>

        <a href="/config/tun" class="bg-white rounded-lg shadow p-6 hover:shadow-lg transition-shadow">
            <div class="flex items-center gap-4">
                <div class="text-4xl">🔧</div>
                <div>
                    <h2 class="text-lg font-medium">TUN 设置</h2>
                    <p class="text-sm text-gray-500">入站 / 路由模式 / DNS 劫持</p>
                </div>
            </div>
        </a>

        <a href="/config/proxy-groups" class="bg-white rounded-lg shadow p-6 hover:shadow-lg transition-shadow">
            <div class="flex items-center gap-4">
                <div class="text-4xl">🔀</div>
                <div>
                    <h2 class="text-lg font-medium">代理分组</h2>
                    <p class="text-sm text-gray-500">节点优先级 / 策略组</p>
                </div>
            </div>
        </a>

        <a href="/config/providers" class="bg-white rounded-lg shadow p-6 hover:shadow-lg transition-shadow">
            <div class="flex items-center gap-4">
                <div class="text-4xl">📡</div>
                <div>
                    <h2 class="text-lg font-medium">订阅源</h2>
                    <p class="text-sm text-gray-500">代理订阅 / 健康检查</p>
                </div>
            </div>
        </a>

        <a href="/config/rules" class="bg-white rounded-lg shadow p-6 hover:shadow-lg transition-shadow">
            <div class="flex items-center gap-4">
                <div class="text-4xl">📋</div>
                <div>
                    <h2 class="text-lg font-medium">规则配置</h2>
                    <p class="text-sm text-gray-500">Rule-Providers / 规则链</p>
                </div>
            </div>
        </a>

        <a href="/config/sniffer" class="bg-white rounded-lg shadow p-6 hover:shadow-lg transition-shadow">
            <div class="flex items-center gap-4">
                <div class="text-4xl">🔍</div>
                <div>
                    <h2 class="text-lg font-medium">嗅探设置</h2>
                    <p class="text-sm text-gray-500">域名嗅探 / TLS / QUIC</p>
                </div>
            </div>
        </a>
    </div>
</div>
{% endblock %}
