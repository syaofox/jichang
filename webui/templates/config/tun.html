{% extends "base.html" %}

{% block title %}TUN 设置 - Clash Config Manager{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex items-center gap-4">
        <a href="/config" class="text-gray-500 hover:text-gray-700">← 配置管理</a>
        <h1 class="text-2xl font-bold">TUN 设置</h1>
    </div>

    <form hx-post="/api/config/tun" hx-swap="none" class="bg-white rounded-lg shadow p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium mb-2">Stack 模式</label>
                <select name="tun.stack" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option value="system" {% if config.tun.stack == 'system' %}selected{% endif %}>System</option>
                    <option value="gvisor" {% if config.tun.stack == 'gvisor' %}selected{% endif %}>Gvisor</option>
                    <option value="mixed" {% if config.tun.stack == 'mixed' %}selected{% endif %}>Mixed</option>
                </select>
                <p class="text-xs text-gray-500 mt-1">推荐使用 Mixed 模式</p>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">DNS 劫持</label>
                <input type="text" name="tun.dns_hijack" value="{{ config.tun.dns_hijack|join(',') }}"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 font-mono">
                <p class="text-xs text-gray-500 mt-1">需要劫持的 DNS 请求</p>
            </div>
        </div>

        <div class="space-y-3">
            <h3 class="font-medium">路由模式 (手动接管)</h3>
            <div class="p-4 bg-gray-50 rounded-lg space-y-3">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" name="tun.auto_route" value="true" {% if config.tun.auto_route %}checked{% endif %}
                        class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                    <div>
                        <span class="font-medium">Auto Route</span>
                        <p class="text-xs text-gray-500">自动设置系统路由</p>
                    </div>
                </label>
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" name="tun.auto_redirect" value="true" {% if config.tun.auto_redirect %}checked{% endif %}
                        class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                    <div>
                        <span class="font-medium">Auto Redirect</span>
                        <p class="text-xs text-gray-500">自动重定向流量</p>
                    </div>
                </label>
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" name="tun.auto_detect_interface" value="true" {% if config.tun.auto_detect_interface %}checked{% endif %}
                        class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                    <div>
                        <span class="font-medium">Auto Detect Interface</span>
                        <p class="text-xs text-gray-500">自动检测出口网卡</p>
                    </div>
                </label>
            </div>
            <p class="text-xs text-yellow-600">⚠️ 启用以上选项将接管全部流量，请确保理解其作用</p>
        </div>

        <div class="flex justify-end">
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                保存配置
            </button>
        </div>
    </form>
</div>
{% endblock %}
