<nav class="bg-gray-800 text-white shadow-lg">
    <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
            <div class="flex items-center gap-8">
                <a href="/" class="text-xl font-bold">🛡️ Clash Manager</a>
                <div class="hidden md:flex gap-4">
                    <a href="/" class="hover:text-blue-300 px-3 py-2 rounded {% if request.url.path == '/' %}bg-gray-700{% endif %}">
                        仪表盘
                    </a>
                    <div class="relative group">
                        <button class="hover:text-blue-300 px-3 py-2 rounded {% if '/config' in request.url.path %}bg-gray-700{% endif %}">
                            配置管理 ▾
                        </button>
                        <div class="absolute hidden group-hover:block bg-gray-700 rounded shadow-lg mt-1 min-w-[160px]">
                            <a href="/config/dns" class="block px-4 py-2 hover:bg-gray-600 {% if request.url.path == '/config/dns' %}bg-gray-600{% endif %}">DNS 设置</a>
                            <a href="/config/tun" class="block px-4 py-2 hover:bg-gray-600 {% if request.url.path == '/config/tun' %}bg-gray-600{% endif %}">TUN 设置</a>
                            <a href="/config/proxy-groups" class="block px-4 py-2 hover:bg-gray-600 {% if request.url.path == '/config/proxy-groups' %}bg-gray-600{% endif %}">代理分组</a>
                            <a href="/config/providers" class="block px-4 py-2 hover:bg-gray-600 {% if request.url.path == '/config/providers' %}bg-gray-600{% endif %}">订阅源</a>
                            <a href="/config/rules" class="block px-4 py-2 hover:bg-gray-600 {% if request.url.path == '/config/rules' %}bg-gray-600{% endif %}">规则配置</a>
                        </div>
                    </div>
                    <a href="/rules" class="hover:text-blue-300 px-3 py-2 rounded {% if '/rules' in request.url.path %}bg-gray-700{% endif %}">
                        规则文件
                    </a>
                    <a href="/configs" class="hover:text-blue-300 px-3 py-2 rounded {% if request.url.path == '/configs' %}bg-gray-700{% endif %}">
                        配置文件
                    </a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative" id="config-switcher">
                    <button id="config-switcher-btn" class="flex items-center gap-2 px-3 py-1.5 bg-gray-700 rounded hover:bg-gray-600">
                        <span class="text-sm">📁</span>
                        <span class="text-sm max-w-[150px] truncate" id="active-config-name">{{ active_config if active_config else '选择配置' }}</span>
                        <span class="text-xs">▾</span>
                    </button>
                    <div id="config-dropdown" class="absolute right-0 hidden bg-gray-700 rounded shadow-lg mt-1 min-w-[200px] z-50">
                        <div id="config-list" class="py-1 max-h-60 overflow-y-auto">
                        </div>
                        <div class="border-t border-gray-600">
                            <a href="/configs" class="block px-4 py-2 hover:bg-gray-600 text-center text-sm">
                                管理配置文件 →
                            </a>
                        </div>
                    </div>
                </div>
                <span class="text-sm text-gray-400">{{ stats.proxy_groups if stats else '' }} 分组</span>
            </div>
        </div>
    </div>
</nav>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('config-switcher-btn');
    const dropdown = document.getElementById('config-dropdown');
    const listEl = document.getElementById('config-list');
    
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        dropdown.classList.toggle('hidden');
        if (!dropdown.classList.contains('hidden') && listEl.children.length === 0) {
            loadConfigs();
        }
    });
    
    document.addEventListener('click', function() {
        dropdown.classList.add('hidden');
    });
    
    async function loadConfigs() {
        try {
            const res = await fetch('/api/configs');
            const data = await res.json();
            listEl.innerHTML = '';
            data.configs.forEach(cfg => {
                const item = document.createElement('button');
                item.className = 'w-full text-left px-4 py-2 hover:bg-gray-600 flex items-center justify-between ' + (cfg.active ? 'bg-gray-600' : '');
                item.innerHTML = `
                    <span class="flex items-center gap-2">
                        ${cfg.active ? '<span class="text-green-400">✓</span>' : '<span class="w-4"></span>'}
                        <span class="truncate">${cfg.name}</span>
                    </span>
                `;
                item.addEventListener('click', () => switchConfig(cfg.name));
                listEl.appendChild(item);
            });
        } catch (e) {
            console.error('Failed to load configs:', e);
        }
    }
    
    async function switchConfig(name) {
        try {
            const res = await fetch(`/api/configs/${encodeURIComponent(name)}/activate`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                document.getElementById('active-config-name').textContent = name;
                dropdown.classList.add('hidden');
                location.reload();
            }
        } catch (e) {
            console.error('Failed to switch config:', e);
        }
    }
});
</script>
