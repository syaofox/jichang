{% extends "base.html" %}

{% block title %}规则文件 - Clash Config Manager{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold">规则文件</h1>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {% for rf in rule_files %}
        <a href="/rules/edit/{{ rf.name }}" class="bg-white rounded-lg shadow p-6 hover:shadow-lg transition-shadow block">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-medium">{{ rf.name }}</h2>
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </div>
            <div class="flex items-center gap-4 text-sm text-gray-600">
                <span class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    {{ rf.rules|length }} 条规则
                </span>
            </div>
            <div class="mt-3 pt-3 border-t">
                <div class="text-xs text-gray-500">路径: rules/{{ rf.name }}</div>
            </div>
        </a>
        {% endfor %}
    </div>

    {% if not rule_files %}
    <div class="bg-white rounded-lg shadow p-6 text-center text-gray-500">
        暂无规则文件
    </div>
    {% endif %}
</div>
{% endblock %}
